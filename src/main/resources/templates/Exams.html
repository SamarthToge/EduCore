<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{Fragments/Head :: head}"></head>
<body>
    <nav th:replace="~{Fragments/sidebar :: sidebar}"></nav>
    <header th:replace="~{Fragments/Header :: header}"></header>
    <div class="overlay-bg" id="overlayBg" onclick="toggleSidebar()"></div>

    <main class="main">
        <section class="page active" id="page-exams">
            <div class="page-header">
                <div class="page-header-left"><h1>Exams & Grades</h1><p>Mid-term 2026 Results</p></div>
                <div class="page-header-actions">
                    <button class="btn btn-ghost">📄 Report Cards</button>
                    <button class="btn btn-primary" onclick="openModal('scheduleExamModal')">+ Schedule Exam</button>
                </div>
            </div>
            <div class="grid-2">
                <div class="card">
                    <div class="card-title"><span class="dot"></span> Grade Distribution</div>
                    <div id="gradeChart"></div>
                </div>
                <div class="card">
                    <div class="card-title"><span class="dot" style="background:var(--accent2)"></span> Subject Performance</div>
                    <div id="subjectPerf"></div>
                </div>
            </div>
            <div class="card" style="margin-top:16px;">
                <div class="card-title"><span class="dot" style="background:var(--accent3)"></span> Student Results — Grade 10A</div>
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>Student</th><th>Maths</th><th>Science</th><th>English</th><th>Hindi</th><th>Social</th><th>Total %</th><th>Grade</th></tr></thead>
                        <tbody id="examTable"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <div class="overlay" id="scheduleExamModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">Schedule New Exam</div>
                <div class="modal-close" onclick="closeModal('scheduleExamModal')">✕</div>
            </div>
            <div class="form-grid">
                <div class="form-group full"><label>Exam Title</label><input type="text" placeholder="Mid-Term Examination 2026" /></div>
                <div class="form-group"><label>Subject</label><select><option>Mathematics</option><option>Science</option><option>English</option><option>Hindi</option><option>Social Studies</option></select></div>
                <div class="form-group"><label>Grade</label><select><option>All Grades</option><option>Grade 10</option><option>Grade 9</option></select></div>
                <div class="form-group"><label>Exam Date</label><input type="date" /></div>
                <div class="form-group"><label>Total Marks</label><input type="number" placeholder="100" /></div>
            </div>
            <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;">
                <button class="btn btn-ghost" onclick="closeModal('scheduleExamModal')">Cancel</button>
                <button class="btn btn-primary" onclick="closeModal('scheduleExamModal');showToast('Exam scheduled!','success')">Schedule Exam</button>
            </div>
        </div>
    </div>

    <div th:replace="~{Fragments/Scripts :: scripts}"></div>
</body>
</html>
