<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduCore — Page Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:      #08090d;
            --surface: #0e1018;
            --surface2:#141824;
            --line:    rgba(255,255,255,0.06);
            --line2:   rgba(255,255,255,0.11);
            --text:    #eceef5;
            --text2:   #8890aa;
            --text3:   #44506e;
            --blue:    #4a8cff;
            --violet:  #7c5cfc;
            --teal:    #00d4aa;
            --red:     #ff4d4f;
            --amber:   #f5a623;
        }

        html, body { height: 100%; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ── CANVAS ── */
        canvas {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
        }

        /* ── NAV ── */
        nav {
            position: relative; z-index: 10;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; height: 64px;
            border-bottom: 1px solid var(--line);
            background: rgba(8,9,13,0.7);
            backdrop-filter: blur(16px);
            flex-shrink: 0;
        }
        .nav-logo {
            display: flex; align-items: center; gap: 10px;
            cursor: pointer; text-decoration: none;
        }
        .logo-mark {
            width: 36px; height: 36px; border-radius: 9px;
            background: linear-gradient(135deg, var(--blue), var(--violet));
            display: flex; align-items: center; justify-content: center;
            font-size: 17px;
            box-shadow: 0 4px 16px rgba(74,140,255,0.28);
        }
        .logo-name {
            font-family: 'Syne', sans-serif; font-size: 1.15rem; font-weight: 800;
            letter-spacing: -.3px; color: var(--text);
        }
        .nav-right { display: flex; gap: 10px; }
        .nav-btn {
            padding: 7px 18px; border-radius: 8px;
            font-family: 'DM Sans', sans-serif; font-size: .84rem; font-weight: 500;
            cursor: pointer; transition: all .18s; border: none;
        }
        .nav-btn-ghost {
            background: transparent; color: var(--text2);
            border: 1px solid var(--line2);
        }
        .nav-btn-ghost:hover { color: var(--text); border-color: var(--text3); }
        .nav-btn-primary {
            background: var(--blue); color: #fff;
            box-shadow: 0 3px 12px rgba(74,140,255,.22);
        }
        .nav-btn-primary:hover { background: #3a7cf0; transform: translateY(-1px); }

        /* ── MAIN ── */
        main {
            flex: 1; position: relative; z-index: 1;
            display: flex; align-items: center; justify-content: center;
            padding: 48px 24px;
        }

        .error-wrap {
            display: flex; flex-direction: column; align-items: center;
            text-align: center; max-width: 560px;
        }

        /* ── GLITCH CODE ── */
        .error-code {
            font-family: 'Syne', sans-serif;
            font-size: clamp(7rem, 18vw, 12rem);
            font-weight: 800; line-height: 1;
            letter-spacing: -.04em;
            position: relative; user-select: none;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255,255,255,0.08);
            margin-bottom: 8px;
        }
        /* Layered gradient fill */
        .error-code::before {
            content: attr(data-code);
            position: absolute; inset: 0;
            background: linear-gradient(135deg, var(--blue) 0%, var(--violet) 50%, rgba(255,255,255,0.15) 100%);
            -webkit-background-clip: text; background-clip: text;
            color: transparent;
            -webkit-text-stroke: 0;
            animation: flicker 6s infinite;
        }
        /* Glitch layer */
        .error-code::after {
            content: attr(data-code);
            position: absolute; inset: 0;
            color: var(--teal);
            -webkit-text-stroke: 0;
            clip-path: polygon(0 30%, 100% 30%, 100% 50%, 0 50%);
            transform: translateX(-3px);
            opacity: 0;
            animation: glitch 6s 1s infinite;
        }
        @keyframes glitch {
            0%,94%,100% { opacity: 0; transform: translateX(0); }
            95%  { opacity: .6; transform: translateX(-4px); }
            96%  { opacity: 0; }
            97%  { opacity: .4; transform: translateX(3px); }
            98%  { opacity: 0; }
        }
        @keyframes flicker {
            0%,97%,100% { opacity: 1; }
            98% { opacity: .85; }
            99% { opacity: 1; }
        }

        /* ── TYPE CHIP ── */
        .error-type-chip {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 12px; border-radius: 20px; margin-bottom: 20px;
            font-family: 'JetBrains Mono', monospace; font-size: .68rem;
            border: 1px solid; background: transparent;
        }

        /* ── HEADING ── */
        .error-title {
            font-family: 'Syne', sans-serif;
            font-size: clamp(1.4rem, 3.5vw, 2.2rem);
            font-weight: 800; letter-spacing: -.03em;
            line-height: 1.15; margin-bottom: 14px;
        }
        .error-desc {
            font-size: .93rem; color: var(--text2); line-height: 1.7;
            max-width: 420px; margin-bottom: 36px;
        }

        /* ── ACTIONS ── */
        .error-actions {
            display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
            margin-bottom: 48px;
        }
        .btn {
            display: inline-flex; align-items: center; gap: 7px;
            padding: 10px 22px; border-radius: 8px;
            font-family: 'DM Sans', sans-serif; font-size: .88rem; font-weight: 500;
            cursor: pointer; transition: all .2s; border: none;
        }
        .btn-primary {
            background: var(--blue); color: #fff;
            box-shadow: 0 4px 16px rgba(74,140,255,.25);
        }
        .btn-primary:hover { background: #3a7cf0; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(74,140,255,.35); }
        .btn-secondary {
            background: var(--surface2); color: var(--text2);
            border: 1px solid var(--line2);
        }
        .btn-secondary:hover { color: var(--text); border-color: var(--text3); transform: translateY(-1px); }

        /* ── QUICK LINKS ── */
        .quick-links-label {
            font-family: 'JetBrains Mono', monospace; font-size: .65rem;
            color: var(--text3); letter-spacing: .1em; text-transform: uppercase;
            margin-bottom: 14px;
        }
        .quick-links {
            display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
        }
        .quick-link {
            display: flex; align-items: center; gap: 6px;
            padding: 8px 16px; border-radius: 8px;
            background: var(--surface); border: 1px solid var(--line);
            font-size: .82rem; color: var(--text2); cursor: pointer;
            transition: all .18s;
        }
        .quick-link:hover { border-color: var(--line2); color: var(--text); background: var(--surface2); transform: translateY(-2px); }
        .quick-link .ql-icon { font-size: .95rem; }

        /* ── ERROR SWITCHER (demo) ── */
        .error-switcher {
            position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 6px; z-index: 20;
            background: var(--surface); border: 1px solid var(--line2);
            border-radius: 50px; padding: 5px 8px;
            box-shadow: 0 8px 32px rgba(0,0,0,.5);
        }
        .es-label {
            font-family: 'JetBrains Mono', monospace; font-size: .62rem;
            color: var(--text3); padding: 0 8px; white-space: nowrap;
        }
        .es-btn {
            padding: 5px 14px; border-radius: 50px;
            font-family: 'JetBrains Mono', monospace; font-size: .7rem;
            cursor: pointer; border: none; background: transparent;
            color: var(--text2); transition: all .15s;
        }
        .es-btn:hover { color: var(--text); background: var(--surface2); }
        .es-btn.active { background: var(--surface2); color: var(--text); }

        /* ── GRID OVERLAY ── */
        .grid-overlay {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image:
                    linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
            background-size: 52px 52px;
            mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black, transparent);
        }

        /* ── FLOATING PARTICLES ── */
        .particles {
            position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
        }
        .particle {
            position: absolute; border-radius: 50%;
            animation: drift linear infinite;
            opacity: 0;
        }
        @keyframes drift {
            0%   { transform: translateY(100vh) scale(0); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: .5; }
            100% { transform: translateY(-100px) scale(1); opacity: 0; }
        }

        /* ── FOOTER ── */
        footer {
            position: relative; z-index: 10;
            border-top: 1px solid var(--line);
            padding: 18px 40px;
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 12px; flex-shrink: 0;
        }
        .footer-left { display: flex; align-items: center; gap: 8px; }
        .footer-text { font-size: .76rem; color: var(--text3); }
        .footer-links { display: flex; gap: 18px; }
        .footer-link { font-size: .76rem; color: var(--text3); cursor: pointer; transition: color .15s; }
        .footer-link:hover { color: var(--text2); }

        a{
            text-decoration: none;
        }
        /* ── RESPONSIVE ── */
        @media (max-width: 600px) {
            nav { padding: 0 20px; }
            .logo-name { display: none; }
            footer { padding: 16px 20px; }
            .footer-links { display: none; }
            .error-switcher { width: 90vw; justify-content: center; }
        }
    </style>
</head>

          <circle cx="0" cy="0" r="16" fill="none" stroke="rgba(0,212,170,0.35)" stroke-width="2"/>
          <circle cx="0" cy="0" r="8" fill="none" stroke="rgba(0,212,170,0.2)" stroke-width="1.5"/>
          <line x1="0" y1="-18" x2="0" y2="-13" stroke="rgba(0,212,170,0.4)" stroke-width="3" stroke-linecap="round"/>
          <line x1="0" y1="13" x2="0" y2="18" stroke="rgba(0,212,170,0.4)" stroke-width="3" stroke-linecap="round"/>
          <line x1="-18" y1="0" x2="-13" y2="0" stroke="rgba(0,212,170,0.4)" stroke-width="3" stroke-linecap="round"/>
          <line x1="13" y1="0" x2="18" y2="0" stroke="rgba(0,212,170,0.4)" stroke-width="3" stroke-linecap="round"/>
          <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
        </g>
        <!-- small gear -->
        <g transform="translate(190,80)" opacity=".35">
          <circle cx="0" cy="0" r="10" fill="none" stroke="rgba(0,212,170,0.35)" stroke-width="1.5"/>
          <circle cx="0" cy="0" r="4" fill="none" stroke="rgba(0,212,170,0.2)" stroke-width="1"/>
          <line x1="0" y1="-12" x2="0" y2="-8" stroke="rgba(0,212,170,0.4)" stroke-width="2" stroke-linecap="round"/>
          <line x1="0" y1="8" x2="0" y2="12" stroke="rgba(0,212,170,0.4)" stroke-width="2" stroke-linecap="round"/>
          <line x1="-12" y1="0" x2="-8" y2="0" stroke="rgba(0,212,170,0.4)" stroke-width="2" stroke-linecap="round"/>
          <line x1="8" y1="0" x2="12" y2="0" stroke="rgba(0,212,170,0.4)" stroke-width="2" stroke-linecap="round"/>
          <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="5s" repeatCount="indefinite"/>
        </g>
        <!-- countdown dots -->
        <circle cx="112" cy="148" r="3" fill="rgba(0,212,170,0.5)"><animate attributeName="opacity" values="1;.2;1" dur="1.4s" repeatCount="indefinite" begin="0s"/></circle>
        <circle cx="130" cy="148" r="3" fill="rgba(0,212,170,0.5)"><animate attributeName="opacity" values="1;.2;1" dur="1.4s" repeatCount="indefinite" begin=".2s"/></circle>
        <circle cx="148" cy="148" r="3" fill="rgba(0,212,170,0.5)"><animate attributeName="opacity" values="1;.2;1" dur="1.4s" repeatCount="indefinite" begin=".4s"/></circle>
      </svg>
    `
        }
    };

    // ── RENDER ERROR ──────────────────────────────────────────────────────
    let currentCode = 404;

    function setError(code, btn) {
        currentCode = code;
        document.querySelectorAll('.es-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');

        const e = errors[code];
        const wrap = document.getElementById('errorWrap');

        const actionsHtml = e.actions.map(a => {
            const onClick = a.onClick ? `onclick="${a.onClick}"` : `onclick="window.location.href='${a.href}'"`;
            return `<button class="btn ${a.primary ? 'btn-primary' : 'btn-secondary'}" ${onClick}>${a.label}</button>`;
        }).join('');

        const linksHtml = e.links.map(l =>
            `<div class="quick-link" onclick="window.location.href='${l.href}'">
       <span class="ql-icon">${l.icon}</span> ${l.label}
     </div>`
        ).join('');

        wrap.style.opacity = '0';
        wrap.style.transform = 'translateY(12px)';
        wrap.style.transition = 'opacity .3s ease, transform .3s ease';

        setTimeout(() => {
            wrap.innerHTML = `
      ${e.illustration}
      <div class="error-type-chip" style="color:${e.chipColor};border-color:${e.chipColor}33;background:${e.chipBg}">
        <span>●</span> ${e.chipLabel}
      </div>
      <div class="error-code" data-code="${e.code}">${e.code}</div>
      <h1 class="error-title">${e.title}</h1>
      <p class="error-desc">${e.desc}</p>
      <div class="error-actions">${actionsHtml}</div>
      <div class="quick-links-label">Quick navigation</div>
      <div class="quick-links">${linksHtml}</div>
    `;
            wrap.style.opacity = '1';
            wrap.style.transform = 'translateY(0)';
        }, 150);
    }

    // ── ANIMATED BG ───────────────────────────────────────────────────────
    const cv = document.getElementById('cv');
    const ctx = cv.getContext('2d');
    let W, H;

    function resize() { W = cv.width = innerWidth; H = cv.height = innerHeight; }
    resize(); window.addEventListener('resize', resize);

    const pts = Array.from({length:55}, () => ({
        x: Math.random() * innerWidth,
        y: Math.random() * innerHeight,
        vx: (Math.random()-.5) * .25,
        vy: (Math.random()-.5) * .25,
        r: Math.random() * 1.4 + .4,
    }));

    function draw() {
        ctx.clearRect(0,0,W,H);
        pts.forEach((a,i) => {
            pts.slice(i+1).forEach(b => {
                const d = Math.hypot(a.x-b.x, a.y-b.y);
                if(d < 110) {
                    ctx.strokeStyle = `rgba(74,140,255,${.05*(1-d/110)})`;
                    ctx.lineWidth = .5;
                    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
                }
            });
            ctx.fillStyle = `rgba(74,140,255,0.25)`;
            ctx.beginPath(); ctx.arc(a.x,a.y,a.r,0,Math.PI*2); ctx.fill();
            a.x += a.vx; a.y += a.vy;
            if(a.x<0||a.x>W) a.vx*=-1;
            if(a.y<0||a.y>H) a.vy*=-1;
        });
        requestAnimationFrame(draw);
    }
    draw();

    // ── FLOATING PARTICLES ────────────────────────────────────────────────
    const pWrap = document.getElementById('particles');
    for(let i=0;i<18;i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random()*3+1;
        const colors = ['rgba(74,140,255,0.5)','rgba(124,92,252,0.4)','rgba(0,212,170,0.35)'];
        p.style.cssText = `
    width:${size}px;height:${size}px;
    left:${Math.random()*100}%;
    background:${colors[Math.floor(Math.random()*colors.length)]};
    animation-duration:${Math.random()*12+8}s;
    animation-delay:${Math.random()*8}s;
  `;
        pWrap.appendChild(p);
    }

    // ── INIT ──────────────────────────────────────────────────────────────
    // Server-injected error code (set by BasicErrorController or GlobalExceptionController)
    const serverCode = /*[[${errorCode ?: status ?: 404}]]*/ 404;
    const initCode   = errors[serverCode] ? serverCode : 404;
    const btnIndex   = [404, 403, 500, 503].indexOf(initCode);
    setError(initCode, document.querySelectorAll('.es-btn')[btnIndex]);

    // Also support ?code= param (manual preview / legacy links)
    const urlCode = parseInt(new URLSearchParams(location.search).get('code'));
    if(errors[urlCode]) {
        setError(urlCode, document.querySelectorAll('.es-btn')[[404,403,500,503].indexOf(urlCode)]);
    }
</script>
</body>
</html>
