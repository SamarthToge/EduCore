<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{Fragments/Head :: head}"></head>
<body>
    <nav th:replace="~{Fragments/sidebar :: sidebar}"></nav>
    <header th:replace="~{Fragments/Header :: header}"></header>
    <div class="overlay-bg" id="overlayBg" onclick="toggleSidebar()"></div>

    <main class="main">
        <section class="page active" id="page-fees">
            <div class="page-header">
                <div class="page-header-left"><h1>Fee Management</h1><p>Academic Year 2025–26</p></div>
                <div class="page-header-actions">
                    <button class="btn btn-ghost">📄 Invoice</button>
                    <button sec:authorize="hasAnyRole('ADMIN', 'PRINCIPAL', 'ACCOUNTANT')" class="btn btn-primary" onclick="openModal('addFeeModal')">+ Record Payment</button>
                </div>
            </div>
            <div class="fee-summary mb-20" id="feeSummary"></div>
            <div class="card">
                <div class="card-title"><span class="dot"></span> Fee Records</div>
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>Student</th><th>Class</th><th>Total Fee</th><th>Paid</th><th>Due</th><th>Due Date</th><th>Status</th><th>Action</th></tr></thead>
                        <tbody id="feeTable"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <div class="overlay" id="addFeeModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">Record Fee Payment</div>
                <div class="modal-close" onclick="closeModal('addFeeModal')">✕</div>
            </div>
            <div class="form-grid">
                <div class="form-group full"><label>Student Name / ID</label><input type="text"
                                                                                    placeholder="Search student…"/>
                </div>
                <div class="form-group"><label>Fee Type</label><select>
                    <option>Tuition Fee</option>
                    <option>Transport Fee</option>
                    <option>Lab Fee</option>
                    <option>Exam Fee</option>
                </select></div>
                <div class="form-group"><label>Amount (₹)</label><input type="number" placeholder="12,000"/></div>
                <div class="form-group"><label>Payment Mode</label><select>
                    <option>Cash</option>
                    <option>UPI</option>
                    <option>Bank Transfer</option>
                    <option>Cheque</option>
                </select></div>
                <div class="form-group"><label>Payment Date</label><input type="date"/></div>
                <div class="form-group"><label>Receipt No.</label><input type="text" placeholder="RC-2026-0041"/></div>
            </div>
            <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;">
                <button class="btn btn-ghost" onclick="closeModal('addFeeModal')">Cancel</button>
                <button class="btn btn-primary"
                        onclick="closeModal('addFeeModal');showToast('Payment recorded!','success')">Record Payment
                </button>
            </div>
        </div>
    </div>

    <div th:replace="~{Fragments/Scripts :: scripts}"></div>
</body>
</html>
