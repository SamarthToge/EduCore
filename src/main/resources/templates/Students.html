<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{Fragments/Head :: head}"></head>
<body>
    <nav th:replace="~{Fragments/sidebar :: sidebar}"></nav>
    <header th:replace="~{Fragments/Header :: header}"></header>
    <div class="overlay-bg" id="overlayBg" onclick="toggleSidebar()"></div>

    <main class="main">
        <section class="page active" id="page-students">
            <div class="page-header">
                <div class="page-header-left">
                    <h1>Students</h1>
                    <p>1,247 students enrolled across 38 classes</p>
                </div>
                <div class="page-header-actions">
                    <button class="btn btn-ghost">⬇ Export</button>
                    <button sec:authorize="hasAnyRole('ADMIN', 'PRINCIPAL', 'TEACHER')" class="btn btn-primary" onclick="openModal('addStudentModal')">+ Add Student</button>
                </div>
            </div>
            <div class="tabs">
                <div class="tab active">All Students</div>
                <div class="tab">Active</div>
                <div class="tab">Inactive</div>
                <div class="tab">Alumni</div>
            </div>

                <div class="flex gap-8 mb-16" style="flex-wrap:wrap;">
                    <div style="flex:1;min-width:200px;display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:8px 14px;">
                        <span>🔍</span>
                        <input type="text" placeholder="Search by name or ID…" style="border:none;background:transparent;padding:0;"/>
                    </div>
                    <select style="width:130px;"><option>All Classes</option><option>Grade 6</option><option>Grade 7</option><option>Grade 8</option><option>Grade 9</option><option>Grade 10</option></select>
                    <select style="width:130px;"><option>All Sections</option><option>Section A</option><option>Section B</option><option>Section C</option></select>
                </div>

                <div class="grid-auto" th:object="${studentlist}">

                    <div class="student-card" th:each="s:${studentlist}">
                        <div class="student-card-top">
                            <div class="student-av" style="background:#4f8ef7;color:white" th:text="${#strings.substring(s.fName,0,1) + #strings.substring(s.lName,0,1)}"></div>
                            <div><div class="student-name" th:text="${s.fName} + ' '+${s.lName}"></div><div class="student-id" th:text="'STU ' +${s.id} + '   Class '+ ${s.stantard}+${s.section}"></div></div>
                        </div>
                        <div class="student-stats">
                            <div class="student-stat"><div class="val" style="color:#4f8ef7" th:text="${s.addentance}+'%'"></div><div class="lbl" >Attendance</div></div>
                            <div class="student-stat"><div class="val" th:text="${s.grade}"></div><div class="lbl">Grade</div></div>
                            <div class="student-stat"><div class="val" style="color:var(--accent3)">↑</div><div class="lbl">Trend</div></div>
                        </div>
                    </div>

                </div>
                </section>
                </main>

                <!-- STUDENT MODAL (Isolated to this page) -->
                <div class="overlay" id="addStudentModal">
                <div class="modal">
                <div class="modal-header">
                    <div class="modal-title">Add New Student</div>
                    <div class="modal-close" onclick="closeModal('addStudentModal')">✕</div>
                </div>
                <form method="post" th:action="@{/saveStudent}" th:object="${student}">
                    <div class="form-grid">

                        <div class="form-group"><label>First Name</label><input type="text" placeholder="Arjun"
                                                                                th:field="*{fName}"/></div>
                        <div class="form-group"><label>Last Name</label><input type="text" placeholder="Sharma"
                                                                               th:field="*{lName}"/></div>
                        <div class="form-group"><label>Date of Birth</label><input type="date" th:field="*{dob}"/></div>
                        <div class="form-group"><label>Gender</label><select th:field="*{gender}">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select></div>
                        <div class="form-group"><label>Class</label><select th:field="*{stantard}">
                            <option value="Grade 6">Grade 6</option>
                            <option value="Grade 7">Grade 7</option>
                            <option value="Grade 8">Grade 8</option>
                            <option value="Grade 9">Grade 9</option>
                            <option value="Grade 10">Grade 10</option>
                        </select></div>
                        <div class="form-group"><label>Section</label><select th:field="*{section}">
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="C">C</option>
                        </select></div>
                        <div class="form-group"><label>Parent/Guardian Name</label><input th:field="*{parName}" type="text"
                                                                                          placeholder="Ramesh Sharma"/>
                        </div>
                        <div class="form-group"><label>Contact Number</label><input th:field="*{contNo}" type="tel"
                                                                                    placeholder="+91 98765 43210"/></div>
                        <div class="form-group full"><label>Address</label><textarea th:field="*{address}" rows="2"
                                                                                     placeholder="House No, Street, City"></textarea>
                        </div>
                        <div class="form-group"><label>Admission Date</label><input type="date" th:field="*{doa}"/></div>
                        <div class="form-group"><label>Previous School</label><input th:field="*{prevSchool}" type="text"
                                                                                     placeholder="St. Xavier's High School"/>
                        </div>

                    </div>
                    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;">
                        <button type="button" class="btn btn-ghost" onclick="closeModal('addStudentModal')">Cancel</button>
                        <button type="submit" class="btn btn-primary">Add Student</button>
                    </div>
                </form>
                </div>
                </div>

                <div th:replace="~{Fragments/Modals :: modals}"></div>
    <div th:replace="~{Fragments/Scripts :: scripts}"></div>
</body>
</html>
