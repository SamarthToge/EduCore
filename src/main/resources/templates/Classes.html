<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{Fragments/Head :: head}"></head>
<body>
    <nav th:replace="~{Fragments/sidebar :: sidebar}"></nav>
    <header th:replace="~{Fragments/Header :: header}"></header>
    <div class="overlay-bg" id="overlayBg" onclick="toggleSidebar()"></div>

    <main class="main">
        <section class="page active" id="page-classes">
            <div class="page-header">
                <div class="page-header-left"><h1>Classes</h1><p>38 classes, 6 grades</p></div>
                <div class="page-header-actions">
                    <button class="btn btn-primary">+ New Class</button>
                </div>
            </div>
            <div class="card">
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>Class</th><th>Section</th><th>Class Teacher</th><th>Students</th><th>Room</th><th>Avg Grade</th><th>Actions</th></tr></thead>
                        <tbody id="classTable"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <div th:replace="~{Fragments/Modals :: modals}"></div>
    <div th:replace="~{Fragments/Scripts :: scripts}"></div>
</body>
</html>
