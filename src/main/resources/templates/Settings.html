<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{Fragments/Head :: head}"></head>
<body>
    <nav th:replace="~{Fragments/sidebar :: sidebar}"></nav>
    <header th:replace="~{Fragments/Header :: header}"></header>
    <div class="overlay-bg" id="overlayBg" onclick="toggleSidebar()"></div>

    <main class="main">
        <section class="page active" id="page-settings">
            <div class="page-header">
                <div class="page-header-left"><h1>Settings</h1><p>Configure your school system</p></div>
            </div>
            <div class="grid-2">
                <div class="card">
                    <div class="card-title"><span class="dot"></span> School Information</div>
                    <div class="form-grid" style="margin-top:4px;">
                        <div class="form-group full"><label>School Name</label><input type="text" value="Delhi Public School – Nashik" /></div>
                        <div class="form-group"><label>Board</label><select><option>CBSE</option><option>ICSE</option><option>State Board</option></select></div>
                        <div class="form-group"><label>Founded Year</label><input type="number" value="1998" /></div>
                        <div class="form-group"><label>Principal Name</label><input type="text" value="Dr. Rekha Sharma" /></div>
                        <div class="form-group"><label>Contact Email</label><input type="email" value="admin@dps-nashik.edu.in" /></div>
                        <div class="form-group full"><label>Address</label><textarea rows="2">Plot 12, Gangapur Road, Nashik – 422013, Maharashtra</textarea></div>
                        <div class="form-group full" style="text-align:right;">
                            <button class="btn btn-primary" onclick="showToast('Settings saved successfully!','success')">💾 Save Changes</button>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-title"><span class="dot" style="background:var(--accent2)"></span> Academic Year</div>
                    <div class="form-grid" style="margin-top:4px;">
                        <div class="form-group"><label>Current Year</label><input type="text" value="2025 – 2026" /></div>
                        <div class="form-group"><label>Term Structure</label><select><option>Trimester</option><option>Semester</option><option>Annual</option></select></div>
                        <div class="form-group"><label>School Start</label><input type="date" value="2025-06-15" /></div>
                        <div class="form-group"><label>School End</label><input type="date" value="2026-04-10" /></div>
                    </div>
                    <div class="divider"></div>
                    <div class="card-title" style="margin-top:4px;"><span class="dot" style="background:var(--accent3)"></span> Notifications</div>
                    <div style="display:flex;flex-direction:column;gap:12px;margin-top:8px;" id="notifSettings"></div>
                </div>
            </div>
        </section>
    </main>

    <div th:replace="~{Fragments/Modals :: modals}"></div>
    <div th:replace="~{Fragments/Scripts :: scripts}"></div>
</body>
</html>
