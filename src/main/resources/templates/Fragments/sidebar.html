<nav class="sidebar" id="sidebar" th:fragment="sidebar" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <div class="sidebar-logo">
        <a th:href="@{/home}">
            <div class="logo-icon">🎓</div>
            <div>
                <div class="logo-text">EduCore</div>
                <div class="logo-sub">SCHOOL MANAGEMENT</div>
            </div>
        </a>
    </div>

    <div class="sidebar-section">
        <div class="sidebar-label">Overview</div>
        <a sec:authorize="hasAnyRole('ADMIN', 'PRINCIPAL', 'TEACHER', 'STUDENT', 'LIBRARIAN', 'ACCOUNTANT')" th:href="@{/dashboard}" class="nav-item" th:classappend="${currentPage == 'dashboard' ? 'active' : ''}">
            <span class="nav-icon">⊞</span> Dashboard
        </a>
    </div>

    <div class="sidebar-section">
        <div class="sidebar-label">Academics</div>
        <a sec:authorize="hasAnyRole('ADMIN', 'PRINCIPAL', 'TEACHER')" th:href="@{/students(stand='All', section='All')}" class="nav-item" th:classappend="${currentPage == 'students' ? 'active' : ''}">
            <span class="nav-icon">👥</span> Students
            <span class="nav-badge">1,247</span>
        </a>
        <a sec:authorize="hasAnyRole('ADMIN', 'PRINCIPAL')" th:href="@{/teachers/All}" class="nav-item" th:classappend="${currentPage == 'teachers' ? 'active' : ''}">
            <span class="nav-icon">🧑‍🏫</span> Employees
        </a>
        <a sec:authorize="hasAnyRole('ADMIN', 'PRINCIPAL', 'TEACHER')" th:href="@{/classes}" class="nav-item" th:classappend="${currentPage == 'classes' ? 'active' : ''}">
            <span class="nav-icon">📚</span> Classes
        </a>
        <a sec:authorize="hasAnyRole('ADMIN', 'PRINCIPAL', 'TEACHER', 'STUDENT')" th:href="@{/schedule}" class="nav-item" th:classappend="${currentPage == 'schedule' ? 'active' : ''}">
            <span class="nav-icon">🗓</span> Schedule
        </a>
        <a sec:authorize="hasAnyRole('ADMIN', 'PRINCIPAL', 'TEACHER', 'STUDENT')" th:href="@{/exams}" class="nav-item" th:classappend="${currentPage == 'exams' ? 'active' : ''}">
            <span class="nav-icon">📝</span> Exams & Grades
        </a>
        <a sec:authorize="hasAnyRole('ADMIN', 'PRINCIPAL', 'TEACHER', 'STUDENT')" th:href="@{/attendance}" class="nav-item" th:classappend="${currentPage == 'attendance' ? 'active' : ''}">
            <span class="nav-icon">✅</span> Attendance
        </a>
    </div>

    <div class="sidebar-section">
        <div class="sidebar-label">Administration</div>
        <a sec:authorize="hasAnyRole('ADMIN', 'PRINCIPAL', 'ACCOUNTANT')" th:href="@{/fees}" class="nav-item" th:classappend="${currentPage == 'fees' ? 'active' : ''}">
            <span class="nav-icon">💳</span> Fee Management
            <span class="nav-badge danger">3</span>
        </a>
        <a sec:authorize="hasAnyRole('ADMIN', 'PRINCIPAL', 'LIBRARIAN', 'STUDENT')" th:href="@{/library}" class="nav-item" th:classappend="${currentPage == 'library' ? 'active' : ''}">
            <span class="nav-icon">📖</span> Library
        </a>
        <a sec:authorize="hasAnyRole('ADMIN', 'PRINCIPAL', 'TEACHER', 'STUDENT', 'LIBRARIAN', 'ACCOUNTANT')" th:href="@{/notices}" class="nav-item" th:classappend="${currentPage == 'notices' ? 'active' : ''}">
            <span class="nav-icon">📢</span> Notices
        </a>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{add-user}" class="nav-item" th:classappend="${currentPage == 'add-user' ? 'active' : ''}">
            <span class="nav-icon">👤</span> Add User
        </a>
        <a sec:authorize="hasAnyRole('ADMIN', 'PRINCIPAL')" th:href="@{/settings}" class="nav-item" th:classappend="${currentPage == 'settings' ? 'active' : ''}">
            <span class="nav-icon">⚙️</span> Settings
        </a>
        <form th:action="@{/logout}" method="post" id="logoutForm" style="display: none;"></form>
        <a href="javascript:void(0)"
              onclick="document.getElementById('logoutForm').submit();"
             class="nav-item">
            <span class="nav-icon">➜]</span> Log-Out
        </a>
    </div>

    <div class="sidebar-footer">
        <a th:href="@{/profile}" class="user-card" th:classappend="${currentPage == 'profile' ? 'active' : ''}" style="text-decoration:none;">
            <div class="user-avatar" sec:authentication="name" th:text="${#strings.substring(#authentication.name, 0, 1).toUpperCase()}">U</div>
            <div>
                <div class="user-name"
                     th:text="${#authentication.principal.fname + ' ' + #authentication.principal.lname}">
                    User Name
                </div>

                <div class="user-role"
                     th:text="${#authentication.principal.role.roleName}">
                    Role
                </div>
            </div>
            <span style="margin-left:auto;color:var(--text3);font-size:0.8rem;">👤</span>
        </a>
    </div>
</nav>
